<!doctype html>
<html lang="lv">
<head>
  <meta charset="utf-8">
  <title>Print environment test</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
    }

    #tileImg {
      width: 256px;
      height: 256px;
      border: 2px solid red;
      display: block;
      margin-bottom: 20px;
    }

    #map {
      width: 900px;
      height: 600px;
      border: 2px solid blue;
    }

    @media print {
      body {
        margin: 0 !important;
        background: white !important;
      }

      button, h1, p {
        display: none !important;
      }

      #tileImg {
        position: fixed !important;
        left: 10mm !important;
        top: 10mm !important;
        width: 60mm !important;
        height: 60mm !important;
        display: block !important;
        visibility: visible !important;
        opacity: 1 !important;
      }

      #map {
        position: fixed !important;
        left: 80mm !important;
        top: 10mm !important;
        width: 180mm !important;
        height: 120mm !important;
        display: block !important;
        visibility: visible !important;
        opacity: 1 !important;
      }

      #map .leaflet-pane,
      #map .leaflet-map-pane,
      #map .leaflet-tile-pane,
      #map .leaflet-layer,
      #map .leaflet-tile-container,
      #map img.leaflet-tile {
        display: block !important;
        visibility: visible !important;
        opacity: 1 !important;
      }
    }
  </style>
</head>

<body>
  <h1>Print environment test</h1>
  <p>Testējam: 1) parastu OSM attēlu; 2) Leaflet karti.</p>

  <button onclick="window.print()">Print test</button>

  <h2>1. Parasts OSM tile kā IMG</h2>
  <img id="tileImg" src="https://a.tile.openstreetmap.org/13/4638/2511.png" alt="OSM tile">

  <h2>2. Leaflet karte</h2>
  <div id="map"></div>

  <script>
    const map = L.map('map', {
      zoomControl: true,
      zoomAnimation: false,
      fadeAnimation: false,
      markerZoomAnimation: false
    }).setView([56.9496, 24.1052], 13);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      subdomains: 'abc',
      maxZoom: 19,
      crossOrigin: false
    }).addTo(map);

    setTimeout(() => {
      map.invalidateSize(true);
    }, 500);
  </script>
</body>
</html>
