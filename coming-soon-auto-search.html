<!doctype html>
<html lang="lv">
<head>
  <meta charset="UTF-8">
  <title>Rīks nedarbojas — Virtuālais kompass</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="stylesheet" href="style.css">

  <style>
    /* ===== COMING SOON LAPAS LOKĀLIE STILI (prefiksi vc-) ===== */

    body.vc-coming-body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #e5e7eb;
      background:
        radial-gradient(circle at top, #1f2937 0, #020617 55%),
        radial-gradient(circle at bottom, #111827 0, #020617 60%);
      display: flex;
      flex-direction: column;
    }

    .vc-coming-main {
      flex-direction: column;  /* PAPILDINĀTS */
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px 52px;
    }

    /* === KARTE: +30% === */
    .vc-coming-card {
      width: min(676px, 100%);           /* 520 → 676 */
      padding: 36px 29px 34px;           /* 28→36, 22→29, 26→34 */
      border-radius: 31px;               /* 24 → 31 */
      border: 1px solid rgba(148,163,184,0.4);
      background:
        radial-gradient(circle at top left, rgba(248,113,113,0.15), transparent 55%),
        radial-gradient(circle at bottom right, rgba(15,23,42,0.9), rgba(15,23,42,0.96));
      box-shadow:
        0 24px 60px rgba(15,23,42,0.9),
        0 0 0 1px rgba(15,23,42,0.9);
      display: grid;
      grid-template-columns: minmax(0, 1fr) 195px; /* 150 → 195 */
      gap: 26px;                         /* 20 → 26 */
      position: relative;
      overflow: hidden;
    }

    @media (max-width: 640px) {
      .vc-coming-card {
        grid-template-columns: minmax(0, 1fr);
        text-align: center;
      }
    }

    /* === BADGE: +30% === */
    .vc-coming-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;                          /* 6 → 8 */
      padding: 5px 13px;                 /* 4→5, 10→13 */
      border-radius: 999px;
      background: rgba(15,23,42,0.9);
      border: 1px solid rgba(248,113,113,0.4);
      font-size: 14px;                   /* 11 → 14 */
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #fecaca;
      margin-bottom: 13px;               /* 10 → 13 */
    }

    .vc-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: #f97373;
      box-shadow: 0 0 0 5px rgba(248,113,113,0.25);
      animation: vc-pulse 2s ease-in-out infinite;
      flex-shrink: 0;
    }

    @keyframes vc-pulse {
      0%, 100% {
        transform: scale(1);
        box-shadow: 0 0 0 5px rgba(248,113,113,0.25);
      }
      50% {
        transform: scale(1.25);
        box-shadow: 0 0 0 8px rgba(248,113,113,0.0),
                    0 0 14px 4px rgba(248,113,113,0.4);
      }
    }

    /* === VIRSRAKSTS: +30% === */
    .vc-coming-title {
      font-size: clamp(29px, 3.9vw, 34px); /* 22→29, 3→3.9, 26→34 */
      margin: 0 0 8px;                   /* 6 → 8 */
      color: #f9fafb;
    }

    .vc-coming-subtitle {
      font-size: 17px;                   /* 13 → 17 */
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: #9ca3af;
      margin-bottom: 18px;               /* 14 → 18 */
    }

    .vc-coming-text {
      font-size: 18px;                   /* 14 → 18 */
      line-height: 1.6;
      color: #e5e7eb;
      margin-bottom: 18px;               /* 14 → 18 */
    }

    .vc-coming-list {
      font-size: 17px;                   /* 13 → 17 */
      color: #9ca3af;
      padding-left: 23px;                /* 18 → 23 */
      margin: 0 0 21px;                  /* 16 → 21 */
    }

    .vc-coming-list li + li {
      margin-top: 5px;                   /* 4 → 5 */
    }

    .vc-coming-meta {
      font-size: 14px;                   /* 11 → 14 */
      text-transform: uppercase;
      letter-spacing: 0.16em;
      color: #6b7280;
      text-align: center;
    }

    .vc-coming-actions {
      margin-top: 21px;                  /* 16 → 21 */
      display: flex;
      flex-wrap: wrap;
      gap: 13px;                         /* 10 → 13 */
      align-items: center;
    }

    .vc-btn-primary {
      border-radius: 999px;
      border: none;
      padding: 10px 21px;                /* 8→10, 16→21 */
      font-size: 16px;                   /* 12 → 16 */
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      color: #0b1120;
      background: linear-gradient(135deg, #f97316, #f97373);
      box-shadow:
        0 10px 26px rgba(248,113,113,0.55),
        0 0 0 1px rgba(15,23,42,0.9);
      display: inline-flex;
      align-items: center;
      gap: 10px;                         /* 8 → 10 */
      transition: transform .16s ease, box-shadow .16s ease, filter .16s ease;
    }

    .vc-btn-primary:hover {
      transform: translateY(-1px);
      filter: brightness(1.03);
      box-shadow:
        0 16px 40px rgba(248,113,113,0.75),
        0 0 0 1px rgba(15,23,42,0.9);
    }

    .vc-btn-primary span.vc-arrow {
      font-size: 21px;                   /* 16 → 21 */
      transform: translateY(1px);
    }

    .vc-coming-hint {
      font-size: 14px;                   /* 11 → 14 */
      color: #9ca3af;
    }

    /* ===== Dekoratīvais "kompass": +30% ===== */
    /* ===== LOGO ===== */
    .vc-coming-logo-wrap {
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 24px;
      width: 100%;
    }

    .vc-coming-logo {
      height: clamp(72px, 12vw, 110px);
      width: auto;
      max-width: 90vw;
      object-fit: contain;
      filter: drop-shadow(0 0 18px rgba(248,113,113,0.3));
      opacity: 0.95;
    }

    .vc-compass-wrap {
      position: relative;
      align-self: center;
      justify-self: center;
      width: 195px;                      /* 150 → 195 */
      height: 195px;
      display: grid;
      place-items: center;
    }

    .vc-compass-ring {
      width: 100%;
      height: 100%;
      border-radius: 999px;
      border: 1px solid rgba(148,163,184,0.5);
      background:
        radial-gradient(circle at center, rgba(15,23,42,1) 0, rgba(15,23,42,0.2) 55%, transparent 100%);
      box-shadow:
        0 0 0 1px rgba(15,23,42,1),
        0 0 39px rgba(248,113,113,0.6);  /* 30 → 39 */
      position: relative;
      overflow: hidden;
      animation: vc-spin 26s linear infinite;
    }

    .vc-compass-ring::before,
    .vc-compass-ring::after {
      content: "";
      position: absolute;
      inset: 14%;
      border-radius: 999px;
      border: 1px dashed rgba(148,163,184,0.8);
      opacity: 0.7;
    }

    .vc-compass-ring::after {
      inset: 34%;
      border-style: solid;
      border-color: rgba(148,163,184,0.4);
      opacity: 0.55;
    }

    .vc-compass-arrow {
      position: absolute;
      width: 5px;                        /* 4 → 5 */
      height: 60%;
      background: linear-gradient(to bottom, #f97373, #991b1b);
      border-radius: 999px;
      top: 10%;
      left: 50%;
      transform: translateX(-50%);
      box-shadow: 0 0 18px rgba(248,113,113,0.7); /* 14 → 18 */
    }

    .vc-compass-arrow::after {
      content: "";
      position: absolute;
      bottom: -18px;                     /* -14 → -18 */
      left: 50%;
      transform: translateX(-50%);
      border-radius: 999px;
      width: 18px;                       /* 14 → 18 */
      height: 18px;
      border: 2px solid rgba(248,250,252,0.8);
      background: radial-gradient(circle, #0b1120, #020617);
    }

    .vc-compass-labels {
      position: absolute;
      inset: 10px;
      display: grid;
      place-items: center;
      font-size: 13px;                   /* 10 → 13 */
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.20em;
      color: #e5e7eb;
    }

    .vc-compass-labels span {
      position: absolute;
    }

    .vc-compass-labels .n { top: 6px; }
    .vc-compass-labels .s { bottom: 6px; opacity: 0.6; }
    .vc-compass-labels .e { right: 8px; opacity: 0.7; }
    .vc-compass-labels .w { left: 8px; opacity: 0.7; }

    .vc-compass-core {
      width: 34px;                       /* 26 → 34 */
      height: 34px;
      border-radius: 999px;
      border: 1px solid rgba(148,163,184,0.6);
      background: radial-gradient(circle, #020617, #111827);
      box-shadow:
        0 0 10px rgba(15,23,42,1),
        0 0 18px rgba(248,113,113,0.55) inset;
    }

    @keyframes vc-spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    @keyframes vc-float {
      0%   { transform: translateY(0px); }
      50%  { transform: translateY(-6px); }
      100% { transform: translateY(0px); }
    }
    /* ===== LOGO ===== */
    .vc-coming-logo-wrap {
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 24px;
      width: 100%;
    }

    .vc-coming-logo {
      height: clamp(72px, 12vw, 110px);
      width: auto;
      max-width: 90vw;
      object-fit: contain;
      filter: drop-shadow(0 0 18px rgba(248,113,113,0.3));
      opacity: 0.95;
    }

    .vc-compass-wrap {
      animation: vc-float 6s ease-in-out infinite;
    }

    /* ===== PROGRESS BAR ===== */
    .vc-progress-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: rgba(148,163,184,0.08);
      border-radius: 0 0 31px 31px;
      overflow: hidden;
    }

    .vc-progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #f97316, #f97373, #f97316);
      background-size: 200% 100%;
      border-radius: 0 2px 2px 0;
      animation: vc-shimmer 2.4s linear infinite;
      width: 0%;
      transition: none;
      box-shadow: 0 0 8px rgba(248,113,113,0.7);
    }
      10%  { width: 18%; }
      28%  { width: 35%; }
      45%  { width: 52%; }
      60%  { width: 63%; }
      72%  { width: 74%; }
      85%  { width: 83%; }
      95%  { width: 93%; }
      100% { width: 100%; }
    }

    @keyframes vc-shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* ===== PROGRESS LABEL ===== */
    .vc-progress-label {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      white-space: nowrap;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: #6b7280;
      animation: vc-blink 2.4s ease-in-out infinite;
    }

    @keyframes vc-blink {
      0%, 100% { opacity: 0.5; }
      50%       { opacity: 1; }
    }
  </style>
</head>

<body class="vc-coming-body">

  <main class="vc-coming-main">
    <div class="vc-coming-logo-wrap">
      <img
        src="https://raw.githubusercontent.com/cadet-tools/virtual-compass/refs/heads/main/img/CADET_TRANSP_.png"
        alt="CADET logo"
        class="vc-coming-logo"
      />
    </div>
    <section class="vc-coming-card">
      <div>
        <div class="vc-coming-badge">
          <span class="vc-dot"></span>
          <span>Rīks nedarbojas</span>
        </div>

        <h1 class="vc-coming-title">
          Rīks nav pieejams
        </h1>
        <p class="vc-coming-subtitle">
          Mēģiniet vēlāk. 🕛
        </p>

        <p class="vc-coming-text">
        </p>

        <ul class="vc-coming-list">
          <li>Mēs pie tā strādājam. 🛠️</li>
        </ul>

        <div class="vc-coming-actions">
          <span class="vc-coming-hint">
            Kad rīks darbosies, šeit automātiski parādīsies saturs.
          </span>
        </div>

        <p class="vc-coming-meta"><br>
          CADET.LV | INTERAKTĪVAIS KOMPASS | © JĀNIS EGLIS
        </p>
      </div>

      <div class="vc-compass-wrap" aria-hidden="true">
        <div class="vc-compass-ring">
          <div class="vc-compass-labels">
            <span class="n">Z</span>
            <span class="e">A</span>
            <span class="s">D</span>
            <span class="w">R</span>
            <div class="vc-compass-core"></div>
          </div>
        </div>
      </div>
      <div class="vc-progress-label">Meklē atjauninājumu…</div>
      <div class="vc-progress-bar">
        <div class="vc-progress-fill"></div>
      </div>
        </section>
  </main>

<script>
  var MAX_TRIES = 3;

  // Manuāla pārlāde → atiestatam skaitītāju
  var isAuto = sessionStorage.getItem("vc_auto_reload");
  if (!isAuto) {
    localStorage.removeItem("vc_reload_count");
    sessionStorage.removeItem("vc_spin_start"); // manuāla pārlāde — sāk no jauna
  }
  sessionStorage.removeItem("vc_auto_reload");

  // Kompasa rotācijas nepārtrauktība
  (function() {
    var SPIN_DURATION = 26; // sekundes — jāsakrīt ar vc-spin animāciju
    var FLOAT_DURATION = 6;

    var spinStart = parseInt(sessionStorage.getItem("vc_spin_start") || "0");
    if (!spinStart) {
      spinStart = Date.now();
      sessionStorage.setItem("vc_spin_start", spinStart);
    }

    var elapsed = (Date.now() - spinStart) / 1000;

    var ring = document.querySelector(".vc-compass-ring");
    var wrap = document.querySelector(".vc-compass-wrap");
    if (ring) ring.style.animationDelay  = "-" + (elapsed % SPIN_DURATION) + "s";
    if (wrap) wrap.style.animationDelay  = "-" + (elapsed % FLOAT_DURATION) + "s";
  })();

  var count    = parseInt(localStorage.getItem("vc_reload_count") || "0");
  var label    = document.querySelector(".vc-progress-label");
  var fill     = document.querySelector(".vc-progress-fill");

  if (count >= MAX_TRIES) {
    // Nav atjauninājumu
    if (label) {
      label.textContent = "Šobrīd nav atjauninājumu — ienāciet vēlāk.";
      label.style.animation = "none";
      label.style.opacity   = "1";
      label.style.color     = "#f97373";
      label.style.bottom    = "12px";
    }
    if (fill) {
      fill.style.transition = "none";
      fill.style.animation  = "none";
      fill.style.width      = "100%";
    }

  } else {
    // Aprēķinam kur sākam un kur beidzam šajā posmā
    var startPct = Math.round((count / MAX_TRIES) * 100);
    var endPct   = count === MAX_TRIES - 1
                    ? 100
                    : Math.round(((count + 1) / MAX_TRIES) * 100);

    // Uzstādam sākuma platumu bez animācijas
    if (fill) {
      fill.style.transition = "none";
      fill.style.width      = startPct + "%";

      // Pēc diviem frame'iem ieslēdzam gludu pāreju uz nākamo posmu
      requestAnimationFrame(function() {
        requestAnimationFrame(function() {
          fill.style.transition = "width 17.5s cubic-bezier(0.4, 0, 0.15, 1)";
          fill.style.width      = endPct + "%";
        });
      });
    }

    // Pēc 18 sek auto-pārlādē
    localStorage.setItem("vc_reload_count", count + 1);
    setTimeout(function() {
      sessionStorage.setItem("vc_auto_reload", "1");
      // Saglabājam rotācijas laiku pirms pārlādes
      var spinStart = sessionStorage.getItem("vc_spin_start") || Date.now();
      sessionStorage.setItem("vc_spin_start", spinStart);
      location.reload();
    }, 18000);
  }
</script>
</body>
</html>
