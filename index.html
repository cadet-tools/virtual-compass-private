<!doctype html>
<html lang="lv">
<head>
  <meta charset="UTF-8">
  <title>Rīks nedarbojas — Virtuālais kompass</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="stylesheet" href="style.css">

  <style>
    /* ===== COMING SOON LAPAS LOKĀLIE STILI (prefiksi vc-) ===== */

    body.vc-coming-body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #e5e7eb;
      background:
        radial-gradient(circle at top, #1f2937 0, #020617 55%),
        radial-gradient(circle at bottom, #111827 0, #020617 60%);
      display: flex;
      flex-direction: column;
    }

    .vc-coming-main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px 52px; /* 32→40, 16→20, 40→52 */
    }

    /* === KARTE: +30% === */
    .vc-coming-card {
      width: min(676px, 100%);           /* 520 → 676 */
      padding: 36px 29px 34px;           /* 28→36, 22→29, 26→34 */
      border-radius: 31px;               /* 24 → 31 */
      border: 1px solid rgba(148,163,184,0.4);
      background:
        radial-gradient(circle at top left, rgba(248,113,113,0.15), transparent 55%),
        radial-gradient(circle at bottom right, rgba(15,23,42,0.9), rgba(15,23,42,0.96));
      box-shadow:
        0 24px 60px rgba(15,23,42,0.9),
        0 0 0 1px rgba(15,23,42,0.9);
      display: grid;
      grid-template-columns: minmax(0, 1fr) 195px; /* 150 → 195 */
      gap: 26px;                         /* 20 → 26 */
      position: relative;
      overflow: hidden;
    }

    @media (max-width: 640px) {
      .vc-coming-card {
        grid-template-columns: minmax(0, 1fr);
        text-align: center;
      }
    }

    /* === BADGE: +30% === */
    .vc-coming-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;                          /* 6 → 8 */
      padding: 5px 13px;                 /* 4→5, 10→13 */
      border-radius: 999px;
      background: rgba(15,23,42,0.9);
      border: 1px solid rgba(248,113,113,0.4);
      font-size: 14px;                   /* 11 → 14 */
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #fecaca;
      margin-bottom: 13px;               /* 10 → 13 */
    }

    .vc-dot {
      width: 9px;                        /* 7 → 9 */
      height: 9px;
      border-radius: 50%;
      background: #f97373;
      box-shadow: 0 0 0 5px rgba(248,113,113,0.25);
    }

    /* === VIRSRAKSTS: +30% === */
    .vc-coming-title {
      font-size: clamp(29px, 3.9vw, 34px); /* 22→29, 3→3.9, 26→34 */
      margin: 0 0 8px;                   /* 6 → 8 */
      color: #f9fafb;
    }

    .vc-coming-subtitle {
      font-size: 17px;                   /* 13 → 17 */
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: #9ca3af;
      margin-bottom: 18px;               /* 14 → 18 */
    }

    .vc-coming-text {
      font-size: 18px;                   /* 14 → 18 */
      line-height: 1.6;
      color: #e5e7eb;
      margin-bottom: 18px;               /* 14 → 18 */
    }

    .vc-coming-list {
      font-size: 17px;                   /* 13 → 17 */
      color: #9ca3af;
      padding-left: 23px;                /* 18 → 23 */
      margin: 0 0 21px;                  /* 16 → 21 */
    }

    .vc-coming-list li + li {
      margin-top: 5px;                   /* 4 → 5 */
    }

    .vc-coming-meta {
      font-size: 14px;                   /* 11 → 14 */
      text-transform: uppercase;
      letter-spacing: 0.16em;
      color: #6b7280;
      text-align: center;
    }

    .vc-coming-actions {
      margin-top: 21px;                  /* 16 → 21 */
      display: flex;
      flex-wrap: wrap;
      gap: 13px;                         /* 10 → 13 */
      align-items: center;
    }

    .vc-btn-primary {
      border-radius: 999px;
      border: none;
      padding: 10px 21px;                /* 8→10, 16→21 */
      font-size: 16px;                   /* 12 → 16 */
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      color: #0b1120;
      background: linear-gradient(135deg, #f97316, #f97373);
      box-shadow:
        0 10px 26px rgba(248,113,113,0.55),
        0 0 0 1px rgba(15,23,42,0.9);
      display: inline-flex;
      align-items: center;
      gap: 10px;                         /* 8 → 10 */
      transition: transform .16s ease, box-shadow .16s ease, filter .16s ease;
    }

    .vc-btn-primary:hover {
      transform: translateY(-1px);
      filter: brightness(1.03);
      box-shadow:
        0 16px 40px rgba(248,113,113,0.75),
        0 0 0 1px rgba(15,23,42,0.9);
    }

    .vc-btn-primary span.vc-arrow {
      font-size: 21px;                   /* 16 → 21 */
      transform: translateY(1px);
    }

    .vc-coming-hint {
      font-size: 14px;                   /* 11 → 14 */
      color: #9ca3af;
    }

    /* ===== Dekoratīvais "kompass": +30% ===== */
    .vc-compass-wrap {
      position: relative;
      align-self: center;
      justify-self: center;
      width: 195px;                      /* 150 → 195 */
      height: 195px;
      display: grid;
      place-items: center;
    }

    .vc-compass-ring {
      width: 100%;
      height: 100%;
      border-radius: 999px;
      border: 1px solid rgba(148,163,184,0.5);
      background:
        radial-gradient(circle at center, rgba(15,23,42,1) 0, rgba(15,23,42,0.2) 55%, transparent 100%);
      box-shadow:
        0 0 0 1px rgba(15,23,42,1),
        0 0 39px rgba(248,113,113,0.6);  /* 30 → 39 */
      position: relative;
      overflow: hidden;
      animation: vc-spin 26s linear infinite;
    }

    .vc-compass-ring::before,
    .vc-compass-ring::after {
      content: "";
      position: absolute;
      inset: 14%;
      border-radius: 999px;
      border: 1px dashed rgba(148,163,184,0.8);
      opacity: 0.7;
    }

    .vc-compass-ring::after {
      inset: 34%;
      border-style: solid;
      border-color: rgba(148,163,184,0.4);
      opacity: 0.55;
    }

    .vc-compass-arrow {
      position: absolute;
      width: 5px;                        /* 4 → 5 */
      height: 60%;
      background: linear-gradient(to bottom, #f97373, #991b1b);
      border-radius: 999px;
      top: 10%;
      left: 50%;
      transform: translateX(-50%);
      box-shadow: 0 0 18px rgba(248,113,113,0.7); /* 14 → 18 */
    }

    .vc-compass-arrow::after {
      content: "";
      position: absolute;
      bottom: -18px;                     /* -14 → -18 */
      left: 50%;
      transform: translateX(-50%);
      border-radius: 999px;
      width: 18px;                       /* 14 → 18 */
      height: 18px;
      border: 2px solid rgba(248,250,252,0.8);
      background: radial-gradient(circle, #0b1120, #020617);
    }

    .vc-compass-labels {
      position: absolute;
      inset: 10px;
      display: grid;
      place-items: center;
      font-size: 13px;                   /* 10 → 13 */
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.20em;
      color: #e5e7eb;
    }

    .vc-compass-labels span {
      position: absolute;
    }

    .vc-compass-labels .n { top: 6px; }
    .vc-compass-labels .s { bottom: 6px; opacity: 0.6; }
    .vc-compass-labels .e { right: 8px; opacity: 0.7; }
    .vc-compass-labels .w { left: 8px; opacity: 0.7; }

    .vc-compass-core {
      width: 34px;                       /* 26 → 34 */
      height: 34px;
      border-radius: 999px;
      border: 1px solid rgba(148,163,184,0.6);
      background: radial-gradient(circle, #020617, #111827);
      box-shadow:
        0 0 10px rgba(15,23,42,1),
        0 0 18px rgba(248,113,113,0.55) inset;
    }

    @keyframes vc-spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    @keyframes vc-float {
      0%   { transform: translateY(0px); }
      50%  { transform: translateY(-6px); }
      100% { transform: translateY(0px); }
    }
    .vc-compass-wrap {
      animation: vc-float 6s ease-in-out infinite;
    }
  </style>
</head>

<body class="vc-coming-body">

  <main class="vc-coming-main">
    <section class="vc-coming-card">
      <div>
        <div class="vc-coming-badge">
          <span class="vc-dot"></span>
          <span>Rīks nedarbojas</span>
        </div>

        <h1 class="vc-coming-title">
          Rīks nav pieejams
        </h1>
        <p class="vc-coming-subtitle">
          Mēģiniet vēlāk. 🕛
        </p>

        <p class="vc-coming-text">
        </p>

        <ul class="vc-coming-list">
          <li>Mēs pie tā strādājam. 🛠️</li>
        </ul>

        <div class="vc-coming-actions">
          <span class="vc-coming-hint">
            Kad rīks darbosies, šeit automātiski parādīsies saturs.
          </span>
        </div>

        <p class="vc-coming-meta"><br>
          CADET.LV | INTERAKTĪVAIS KOMPASS | © JĀNIS EGLIS
        </p>
      </div>

      <div class="vc-compass-wrap" aria-hidden="true">
        <div class="vc-compass-ring">
          <div class="vc-compass-labels">
            <span class="n">Z</span>
            <span class="e">A</span>
            <span class="s">D</span>
            <span class="w">R</span>
            <div class="vc-compass-core"></div>
          </div>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
